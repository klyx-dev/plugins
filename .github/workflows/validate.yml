name: Validate & Publish

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - 'incoming/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Validate bundles
        run: |
          for f in incoming/*.klyx; do
            [ ! -f "$f" ] && continue
            python3 .github/workflows/validate_bundle.py "$f"
          done

  publish:
    needs: validate
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Merge PR and update
        run: |
          git config user.name "klyx-bot"
          git config user.email "bot@klyx-dev.github.io"
          git remote set-url origin "https://x-access-token:${BOT_PAT}@github.com/klyx-dev/plugins.git"
          git fetch origin ${{ github.event.pull_request.head.sha }}
          git merge ${{ github.event.pull_request.head.sha }} --no-edit
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}

      - name: Publish bundles
        run: python3 .github/workflows/publish.py

      - name: Commit and push to main
        run: |
          git config user.name "klyx-bot"
          git config user.email "bot@klyx-dev.github.io"
          git add plugins/ incoming/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git remote set-url origin "https://x-access-token:${BOT_PAT}@github.com/klyx-dev/plugins.git"
          git commit -m "publish plugins"
          git push origin main
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}

      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/klyx-dev/plugins@main/plugins/index.json"
          for f in incoming/*.klyx; do
            [ ! -f "$f" ] && continue
            id=$(python3 -c "
import json, tarfile
with tarfile.open('$f', 'r:gz') as t:
    meta = json.loads(t.extractfile('plugin.json').read())
print(f'{meta[\"id\"]}/{meta[\"version\"]}.klyx')
print(f'{meta[\"id\"]}/metadata.json')
print(f'{meta[\"id\"]}/icon.png')
print(f'{meta[\"id\"]}/readme.md')
print(f'{meta[\"id\"]}/changelog.md')
" 2>/dev/null)
            for path in $id; do
              [ -n "$path" ] && curl -s "https://purge.jsdelivr.net/gh/klyx-dev/plugins@main/plugins/$path" > /dev/null
            done
          done
