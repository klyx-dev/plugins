name: Validate Plugin

on:
  pull_request:
    paths:
      - 'incoming/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate bundles
        run: |
          for f in incoming/*.klyx; do
            [ ! -f "$f" ] && continue
            python3 .github/workflows/validate_bundle.py "$f"
          done
