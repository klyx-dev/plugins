name: Publish Plugin

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect bundles
        run: |
          mkdir -p workspace incoming
          shopt -s nullglob
          files=(incoming/*.klyx)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .klyx files found in incoming/"
            exit 0
          fi
          for f in "${files[@]}"; do
            cp "$f" workspace/
          done

      - name: Publish bundles
        run: python3 .github/workflows/publish.py

      - name: Create PR and merge
        run: |
          git config user.name "klyx-bot"
          git config user.email "bot@klyx-dev.github.io"
          git add plugins/ incoming/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TIMESTAMP=$(date +%s)
          BRANCH="publish/auto-$TIMESTAMP"
          git checkout -b "$BRANCH"
          git commit -m "publish plugins"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "Publish plugins" --body "Auto-generated PR"
          gh pr merge --merge --admin
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
