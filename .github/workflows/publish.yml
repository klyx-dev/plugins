name: Publish Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect bundles
        run: |
          mkdir -p workspace
          for f in incoming/*.klyx; do
            [ -f "$f" ] && cp "$f" workspace/
          done

      - name: Publish bundles
        run: python3 .github/workflows/publish.py

      - name: Commit and push
        run: |
          git config user.name "klyx-bot"
          git config user.email "bot@klyx-dev.github.io"
          git remote set-url origin "https://x-access-token:${BOT_PAT}@github.com/klyx-dev/plugins.git"
          git add plugins/ incoming/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "publish plugins"
          git push
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
